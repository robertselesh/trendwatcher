[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Friendlier API paths: /api/ai and /api/news map to the Netlify Functions
[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai"
  status = 200
  force = true

[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200
  force = true

[[redirects]]
  from = "/api/yfinance"
  to = "/.netlify/functions/yfinance"
  status = 200
  force = true

[[redirects]]
  from = "/api/targets"
  to = "/.netlify/functions/targets"
  status = 200
  force = true

[[redirects]]
  from = "/breakout-watchlist"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
